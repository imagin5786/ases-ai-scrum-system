# ASES v3.0 — System Configuration

models:
  reasoning: claude-opus-4-5-20251101   # Opus: planning, design, critique
  execution: claude-sonnet-4-5-20251101 # Sonnet: implementation, tests, devops
  ui: gemini-3.1-pro                    # Gemini: UI spec + scaffold
  decision: human                        # PO: 6 gates per sprint

context_levels:
  lean:
    file: .ases/context.json
    loaded_by: hook_always
    max_fields: 8
  sprint:
    file: .ases/sprint_context.json
    loaded_by: hook_active_sprint
    written_by: ases-sprint-gate
    cleared_by: ases-sprint-close
  global:
    file: .ases/global_context.json
    loaded_by: explicit_only
    commands: [ases-inject, ases-release, ases-prd-update, ases-context, ases-gc]
    id_prefixes: [SP, DS, TD, FT, RI, CF]

hard_rules:
  - JSON_and_MD_dual_format_every_document
  - output_files_list_is_complete_write_scope
  - critique_loop_max_3_iterations_then_escalate
  - no_agent_role_overlap
  - scaffold_spec_json_gates_sonnet_execution
  - ui_scaffold_locked_after_creation
  - commit_only_after_uat_approval
  - every_tradeoff_produces_typed_ADR_entry
  - test_cases_derived_from_AC_never_invented
  - test_naming_convention_test_tcid_description

po_only_files:
  - .ases/decisions.json
  - .ases/decisions.md
  - .ases/global_context.json
  - .ases/global_context.md
  - docs/prd.md
  - docs/roadmap.md
  - docs/hld.md
